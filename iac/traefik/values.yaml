# Traefik Configuration for v39.x
deployment:
  replicas: ~

# Service configuration
service:
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-subnets: "${subnet_ids}"

# Ports configuration
ports:
  web:
    port: 8000
    exposedPort: 80
    protocol: TCP
  websecure:
    port: 8443
    exposedPort: 443
    protocol: TCP

# Providers
providers:
  kubernetesCRD:
    enabled: true
  kubernetesIngress:
    enabled: true

# General Traefik logs (v41+ key)
log:
  level: INFO

# Access logs
accessLog:
  enabled: true

# Additional arguments
additionalArguments:
  - "--api.dashboard=true"
  - "--api.insecure=true"

ingressRoute:
  dashboard:
    enabled: true
    matchRule: PathPrefix(`/dashboard`)
    entryPoints:
      - web

# RBAC
rbac:
  enabled: true

# Autoscaling
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

# Resource requests/limits (required for HPA CPU metrics)
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
