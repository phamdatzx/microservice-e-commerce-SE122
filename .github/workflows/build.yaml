name: Build and Push Docker Images to ECR

on:
  push:
    branches: main
  pull_request:
    branches: main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Version tag to build'
        required: true
        type: string
env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: 202717922170.dkr.ecr.ap-southeast-1.amazonaws.com
  ECR_REPOSITORY: se-122/user-service

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
          
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: false
  
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set version
        id: set-version
        run: |
          if [ -z "${{ inputs.version }}" ]; then
            echo "VERSION=${{ github.sha }}" >> $GITHUB_ENV
          else
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          fi
   
      - name: Build, Tag and Push Docker images
        run: |
          ./scripts/build.sh $VERSION user-service,product-service ${{ env.ECR_REGISTRY }}
              
      - name: Output image URI
        run: |
          echo "IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest" >> $GITHUB_OUTPUT
        id: build-output