name: Build and Push Docker Images to ECR

on:
  push:
    branches: main
  pull_request:
    branches: main
  
env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: 202717922170.dkr.ecr.ap-southeast-1.amazonaws.com
  ECR_REPOSITORY: se-122/user-service

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
  
  steps:
    - name: Checkout code
      uses: actions/checkout@v4
        
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
        mask-aws-account-id: false
        
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
      
    - name: Build Docker image
      run: |
        docker build -t nodejs-random-color:latest .
        
    - name: Tag and push image to ECR
      run: |
        docker tag nodejs-random-color:${{ inputs.version }} ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
        docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
        
    - name: Output image URI
      run: |
        echo "IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest" >> $GITHUB_OUTPUT
      id: build-output