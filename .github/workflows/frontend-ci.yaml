name: frontend CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'shared/**'
      - 'Dockerfile'

  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          echo "VERSION=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env file
        run: |
          echo "VITE_BE_API_URL=${{ secrets.VITE_BE_API_URL }}" >> frontend/.env
          echo "VITE_GHN_TOKEN=${{ secrets.VITE_GHN_TOKEN }}" >> frontend/.env
          echo "VITE_GHN_URL=${{ secrets.VITE_GHN_URL }}" >> frontend/.env

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.version.outputs.OWNER }}/frontend:latest
            ghcr.io/${{ steps.version.outputs.OWNER }}/frontend:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max