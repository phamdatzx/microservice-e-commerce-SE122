apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.appName }}-ingress-public
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    # CORS middleware only — no auth for health check
    traefik.ingress.kubernetes.io/router.middlewares: "default-cors-headers@kubernetescrd"
    traefik.ingress.kubernetes.io/router.priority: "110"
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api/ai/health
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.appName }}-service
                port:
                  number: {{ .Values.service.port }}
