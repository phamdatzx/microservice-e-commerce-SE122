apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.appName }}-service
  namespace: default
  labels:
    app: {{ .Values.appName }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  selector:
    app: {{ .Values.appName }}
  ports:
    - port: {{ .Values.service.amqpPort }}
      targetPort: 5672
      protocol: TCP
      name: amqp
    - port: {{ .Values.service.managementPort }}
      targetPort: 15672
      protocol: TCP
      name: management
