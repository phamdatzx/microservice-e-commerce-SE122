appName: order-service
replicas: 1
image: ghcr.io/phamdatzx/order-service
tag: latest
containerPort: 8085

service:
  type: ClusterIP
  port: 8085

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
